<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d3436">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Speed Flow">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://unpkg.com">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2769/2769339.png">

    <title>Speed Flow | Expedição e Loja</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2769/2769339.png" type="image/png">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: #2d3436; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* Proteção para Notch/Câmera de Celulares Modernos */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
        }

        .app-container { position: absolute; top: -28px; left: 0; width: 100%; height: calc(100% + 28px); transition: top 0.3s ease, height 0.3s ease; }
        iframe { width: 100%; height: 100%; border: none; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2d3436; color: white; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; transition: opacity 0.6s ease-out, visibility 0.6s; }
        .spinner { width: 55px; height: 55px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #0984e3; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-title { font-size: 18px; font-weight: 900; letter-spacing: 1.5px; }
        .loading-sub { font-size: 13px; color: #b2bec3; margin-top: 8px; }

        #cam-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 25vh; background: #000; z-index: 99999; border-bottom: 4px solid #8e44ad; box-sizing: border-box; overflow: hidden; }
        #reader { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #reader video { object-fit: cover !important; height: 100% !important; width: 100% !important; }
        
        .btn-fechar { position: absolute; top: 10px; right: 10px; background: rgba(214, 48, 49, 0.9); color: white; border: 2px solid #fff; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; font-size: 16px; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        
        /* 🚀 MIRA A LASER PROFISSIONAL PARA A CÂMERA */
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 150px; border: 2px solid rgba(0, 184, 148, 0.8);
            border-radius: 12px; pointer-events: none; z-index: 10;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); /* Escurece o fundo fora da mira */
        }
        .scan-laser {
            width: 100%; height: 2px; background: #d63031; position: absolute; top: 0;
            box-shadow: 0 0 10px #d63031, 0 0 20px #d63031;
            animation: scanAnim 2s infinite ease-in-out;
        }
        @keyframes scanAnim { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-title">🚀 SPEED FLOW</div>
        <div class="loading-sub">Sincronizando banco de dados...</div>
    </div>

    <div id="app-wrapper" class="app-container">
        <iframe 
            id="gas-frame" 
            src="https://script.google.com/macros/s/AKfycbxooE6g-Zav8DmwBYEhmAVyxX0F2C8vJNLMmLgO3a5xK5N_vtZDlNIapllnvx3jLqIx/exec" 
            allow="camera *; microphone *; display-capture *; fullscreen *"
            onload="fadeOutLoading()">
        </iframe>
    </div>

    <div id="cam-container">
        <button class="btn-fechar" onclick="fecharCamera()">X</button>
        <div id="reader"></div>
        <div class="scan-overlay" id="scan-target" style="display:none;">
            <div class="scan-laser"></div>
        </div>
    </div>

    <script>
        function fadeOutLoading() {
            const loader = document.getElementById('loading');
            setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => { loader.style.visibility = 'hidden'; }, 600); }, 800);
        }

        let scanner = null;
        let contextoAtual = "";
        let janelaDoGoogle = null;
        let isProcessing = false;

        window.addEventListener('message', function(e) {
            if (e.data && e.data.action === 'OPEN_CAMERA') {
                contextoAtual = e.data.contexto;
                janelaDoGoogle = e.source; 
                abrirCamera();
            }
        });

        function abrirCamera() {
            document.getElementById('cam-container').style.display = 'block';
            document.getElementById('app-wrapper').style.top = 'calc(25vh - 28px)';
            document.getElementById('app-wrapper').style.height = 'calc(75vh + 28px)';

            scanner = new Html5Qrcode("reader");
            scanner.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 250, height: 150 }, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
                (decodedText) => {
                    if (isProcessing) return;
                    isProcessing = true;
                    tocarBip();
                    
                    if (janelaDoGoogle) {
                        janelaDoGoogle.postMessage({ action: 'SCAN_SUCCESS', code: decodedText, contexto: contextoAtual }, '*');
                    }
                    setTimeout(() => { isProcessing = false; }, 1500);
                },
                (error) => {}
            ).then(() => {
                document.getElementById('scan-target').style.display = 'block';
            }).catch(err => {
                alert("Erro ao ligar a lente: " + err);
                fecharCamera();
            });
        }

        function fecharCamera() {
            let camDiv = document.getElementById('cam-container');
            let appWrapper = document.getElementById('app-wrapper');
            let target = document.getElementById('scan-target');
            
            if (camDiv) camDiv.style.display = 'none';
            if (target) target.style.display = 'none';
            
            if (appWrapper) {
                appWrapper.style.top = '-28px';
                appWrapper.style.height = 'calc(100% + 28px)';
            }

            if (janelaDoGoogle) {
                janelaDoGoogle.postMessage({ action: 'CAMERA_CLOSED' }, '*');
            }

            if (scanner) {
                try {
                    scanner.stop().then(() => { scanner.clear(); scanner = null; }).catch(e => { scanner = null; });
                } catch(e) { scanner = null; }
            }
        }

        function tocarBip() {
            try { let ctx = new (window.AudioContext || window.webkitAudioContext)(); let osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 1800; osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e){}
        }

        // PWA NATIVO: Registra o Service Worker e Força Atualização
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.update(); // 🌟 Tenta atualizar o Service Worker toda vez que a página abre
                }).catch(error => {
                    console.log('SW falhou:', error);
                });
            });
        }
    </script>
</body>
</html>
