<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Flow | Conectando...</title>
    
    <!-- Ícone da aba do navegador -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2769/2769339.png" type="image/png">

    <style>
        /* Tela de carregamento elegante com a identidade do seu sistema */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #2d3436; 
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 50px; 
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #0984e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        h2 { margin: 0; font-size: 20px; }
        p { margin-top: 10px; font-size: 14px; color: #b2bec3; }
    </style>

    <script>
        // O Redirecionamento Supremo
        // Usamos 'replace' para que o operador não fique preso nesta tela se clicar em "Voltar" no telemóvel
        window.onload = function() {
            setTimeout(function() {
                window.location.replace("https://script.google.com/macros/s/AKfycbxooE6g-Zav8DmwBYEhmAVyxX0F2C8vJNLMmLgO3a5xK5N_vtZDlNIapllnvx3jLqIx/exec");
            }, 1200); // Aguarda 1.2 segundos para o efeito visual e transfere
        };
    </script>
</head>
<body>

    <div class="spinner"></div>
    <h2>Acedendo ao Speed Flow...</h2>
    <p>A estabelecer ambiente seguro para a câmera</p>

</body>
</html>
